<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Watch Face -->
  <circle cx="100" cy="100" r="98" fill="#B71C1C" stroke="#FF5252" stroke-width="2"/>
  
  <!-- Alert Icon -->
  <text x="100" y="55" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">⚠️ HR HIGH</text>
  
  <!-- BPM Value -->
  <text x="100" y="110" font-family="Arial" font-size="48" fill="#FFEB3B" text-anchor="middle" font-weight="black">165</text>
  <text x="100" y="130" font-family="Arial" font-size="10" fill="white" text-anchor="middle">BPM</text>
  
  <!-- Dismiss Button -->
  <rect x="70" y="150" width="60" height="25" rx="12.5" fill="white"/>
  <text x="100" y="167" font-family="Arial" font-size="10" fill="#B71C1C" text-anchor="middle" font-weight="bold">OK</text>
</svg>
